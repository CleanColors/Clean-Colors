<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <!-- Colores de tapita por producto -->
    <linearGradient id="cap1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A4A78"/>
      <stop offset="100%" style="stop-color:#0E3050"/>
    </linearGradient>
    <linearGradient id="cap2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2391CC"/>
      <stop offset="100%" style="stop-color:#1277A8"/>
    </linearGradient>
    <linearGradient id="cap3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B89E"/>
      <stop offset="100%" style="stop-color:#009B87"/>
    </linearGradient>
    <linearGradient id="cap4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CC6EE"/>
      <stop offset="100%" style="stop-color:#2EB5F0"/>
    </linearGradient>
    <!-- Cuerpo blanco con sombra sutil -->
    <linearGradient id="body-white" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F0F7"/>
      <stop offset="30%" style="stop-color:#FFFFFF"/>
      <stop offset="80%" style="stop-color:#F0F6FB"/>
      <stop offset="100%" style="stop-color:#D8E6F0"/>
    </linearGradient>
    <!-- Sombra de gota -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="label-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Sombra de piso -->
  <ellipse cx="260" cy="198" rx="230" ry="5" fill="rgba(0,0,0,0.10)"/>

  <!-- ==============================
       BOTELLA 1: DETERGENTE — 7ml
       ============================== -->
  <g transform="translate(40, 10)" filter="url(#shadow)">
    <!-- Tapita -->
    <rect x="17" y="2" width="26" height="16" rx="5" fill="url(#cap1)"/>
    <!-- Brillo tapita -->
    <rect x="19" y="4" width="8" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <!-- Rim -->
    <rect x="13" y="16" width="34" height="6" rx="2" fill="#0E3050"/>
    <!-- Cuello -->
    <rect x="18" y="22" width="24" height="12" fill="#D8E6F0"/>
    <!-- Hombro -->
    <path d="M8,34 Q8,31 18,31 L42,31 Q52,31 52,34 L52,41 L8,41 Z" fill="url(#body-white)"/>
    <!-- Cuerpo -->
    <rect x="8" y="39" width="44" height="130" rx="10" fill="url(#body-white)"/>
    <!-- Highlight izquierdo -->
    <rect x="11" y="43" width="7" height="120" rx="3.5" fill="rgba(255,255,255,0.6)"/>
    <!-- Etiqueta fondo -->
    <rect x="11" y="54" width="38" height="85" rx="5" fill="white" opacity="0.98" filter="url(#label-shadow)"/>
    <!-- Barra color superior etiqueta -->
    <rect x="11" y="54" width="38" height="13" rx="5" fill="#0E3050"/>
    <rect x="11" y="60" width="38" height="7" fill="#0E3050"/>
    <!-- CC logo -->
    <text x="30" y="65" text-anchor="middle" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="white" letter-spacing="0.5">CC</text>
    <!-- Línea -->
    <line x1="15" y1="72" x2="45" y2="72" stroke="#D0DDE8" stroke-width="0.6"/>
    <!-- Nombre producto -->
    <text x="30" y="84" text-anchor="middle" font-size="7.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">DETER-</text>
    <text x="30" y="94" text-anchor="middle" font-size="7.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">GENTE</text>
    <!-- Marca -->
    <text x="30" y="106" text-anchor="middle" font-size="4.8" font-family="Arial, sans-serif" fill="#0E3050" letter-spacing="0.7">CLEAN COLORS</text>
    <!-- Bio -->
    <text x="30" y="120" text-anchor="middle" font-size="5" font-family="Arial, sans-serif" fill="#009B87">🌿 Biodegradable</text>
    <!-- Cantidad -->
    <text x="30" y="132" text-anchor="middle" font-size="6" font-family="Arial, sans-serif" font-weight="700" fill="#5A6E80">7 ml</text>
    <!-- Base -->
    <path d="M8,169 L8,177 Q8,181 18,181 L42,181 Q52,181 52,177 L52,169 Z" fill="#D8E6F0"/>
  </g>

  <!-- ==============================
       BOTELLA 2: DET. NEUTRO — 7ml
       ============================== -->
  <g transform="translate(155, 10)" filter="url(#shadow)">
    <rect x="17" y="2" width="26" height="16" rx="5" fill="url(#cap2)"/>
    <rect x="19" y="4" width="8" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="13" y="16" width="34" height="6" rx="2" fill="#1277A8"/>
    <rect x="18" y="22" width="24" height="12" fill="#D8E6F0"/>
    <path d="M8,34 Q8,31 18,31 L42,31 Q52,31 52,34 L52,41 L8,41 Z" fill="url(#body-white)"/>
    <rect x="8" y="39" width="44" height="130" rx="10" fill="url(#body-white)"/>
    <rect x="11" y="43" width="7" height="120" rx="3.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="11" y="54" width="38" height="85" rx="5" fill="white" opacity="0.98" filter="url(#label-shadow)"/>
    <rect x="11" y="54" width="38" height="13" rx="5" fill="#1277A8"/>
    <rect x="11" y="60" width="38" height="7" fill="#1277A8"/>
    <text x="30" y="65" text-anchor="middle" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="white" letter-spacing="0.5">CC</text>
    <line x1="15" y1="72" x2="45" y2="72" stroke="#D0DDE8" stroke-width="0.6"/>
    <text x="30" y="82" text-anchor="middle" font-size="6.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">DETER.</text>
    <text x="30" y="92" text-anchor="middle" font-size="6.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">NEUTRO</text>
    <text x="30" y="106" text-anchor="middle" font-size="4.8" font-family="Arial, sans-serif" fill="#1277A8" letter-spacing="0.7">CLEAN COLORS</text>
    <text x="30" y="120" text-anchor="middle" font-size="5" font-family="Arial, sans-serif" fill="#009B87">🌿 Biodegradable</text>
    <text x="30" y="132" text-anchor="middle" font-size="6" font-family="Arial, sans-serif" font-weight="700" fill="#5A6E80">7 ml</text>
    <path d="M8,169 L8,177 Q8,181 18,181 L42,181 Q52,181 52,177 L52,169 Z" fill="#D8E6F0"/>
  </g>

  <!-- ==============================
       BOTELLA 3: SUAVIZANTE — 5ml
       ============================== -->
  <g transform="translate(270, 5)" filter="url(#shadow)">
    <rect x="17" y="2" width="26" height="16" rx="5" fill="url(#cap3)"/>
    <rect x="19" y="4" width="8" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="13" y="16" width="34" height="6" rx="2" fill="#009B87"/>
    <rect x="18" y="22" width="24" height="12" fill="#D8E6F0"/>
    <path d="M8,34 Q8,31 18,31 L42,31 Q52,31 52,34 L52,41 L8,41 Z" fill="url(#body-white)"/>
    <rect x="8" y="39" width="44" height="130" rx="10" fill="url(#body-white)"/>
    <rect x="11" y="43" width="7" height="120" rx="3.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="11" y="54" width="38" height="85" rx="5" fill="white" opacity="0.98" filter="url(#label-shadow)"/>
    <rect x="11" y="54" width="38" height="13" rx="5" fill="#009B87"/>
    <rect x="11" y="60" width="38" height="7" fill="#009B87"/>
    <text x="30" y="65" text-anchor="middle" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="white" letter-spacing="0.5">CC</text>
    <line x1="15" y1="72" x2="45" y2="72" stroke="#D0DDE8" stroke-width="0.6"/>
    <text x="30" y="84" text-anchor="middle" font-size="7.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">SUAVI-</text>
    <text x="30" y="94" text-anchor="middle" font-size="7.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">ZANTE</text>
    <text x="30" y="106" text-anchor="middle" font-size="4.8" font-family="Arial, sans-serif" fill="#009B87" letter-spacing="0.7">CLEAN COLORS</text>
    <text x="30" y="120" text-anchor="middle" font-size="5" font-family="Arial, sans-serif" fill="#009B87">🌿 Biodegradable</text>
    <text x="30" y="132" text-anchor="middle" font-size="6" font-family="Arial, sans-serif" font-weight="700" fill="#5A6E80">5 ml</text>
    <path d="M8,169 L8,177 Q8,181 18,181 L42,181 Q52,181 52,177 L52,169 Z" fill="#D8E6F0"/>
  </g>

  <!-- ==============================
       BOTELLA 4: DESENGRASANTE — 5ml
       ============================== -->
  <g transform="translate(385, 10)" filter="url(#shadow)">
    <rect x="17" y="2" width="26" height="16" rx="5" fill="url(#cap4)"/>
    <rect x="19" y="4" width="8" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="13" y="16" width="34" height="6" rx="2" fill="#2EB5F0"/>
    <rect x="18" y="22" width="24" height="12" fill="#D8E6F0"/>
    <path d="M8,34 Q8,31 18,31 L42,31 Q52,31 52,34 L52,41 L8,41 Z" fill="url(#body-white)"/>
    <rect x="8" y="39" width="44" height="130" rx="10" fill="url(#body-white)"/>
    <rect x="11" y="43" width="7" height="120" rx="3.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="11" y="54" width="38" height="85" rx="5" fill="white" opacity="0.98" filter="url(#label-shadow)"/>
    <rect x="11" y="54" width="38" height="13" rx="5" fill="#2EB5F0"/>
    <rect x="11" y="60" width="38" height="7" fill="#2EB5F0"/>
    <text x="30" y="65" text-anchor="middle" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="white" letter-spacing="0.5">CC</text>
    <line x1="15" y1="72" x2="45" y2="72" stroke="#D0DDE8" stroke-width="0.6"/>
    <text x="30" y="84" text-anchor="middle" font-size="7.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">DESEN-</text>
    <text x="30" y="94" text-anchor="middle" font-size="6.5" font-family="Arial, sans-serif" font-weight="700" fill="#0A1E30">GRASANTE</text>
    <text x="30" y="106" text-anchor="middle" font-size="4.8" font-family="Arial, sans-serif" fill="#2EB5F0" letter-spacing="0.7">CLEAN COLORS</text>
    <text x="30" y="120" text-anchor="middle" font-size="5" font-family="Arial, sans-serif" fill="#009B87">🌿 Biodegradable</text>
    <text x="30" y="132" text-anchor="middle" font-size="6" font-family="Arial, sans-serif" font-weight="700" fill="#5A6E80">5 ml</text>
    <path d="M8,169 L8,177 Q8,181 18,181 L42,181 Q52,181 52,177 L52,169 Z" fill="#D8E6F0"/>
  </g>

</svg>
